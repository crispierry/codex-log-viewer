name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify app version bump
        if: github.event_name == 'pull_request'
        run: node scripts/check-app-version.mjs --compare-ref "origin/${{ github.base_ref }}" --require-pr-minor
      - run: npm run privacy:scan
      - run: npm run lint
      - run: npm test
      - run: npm run build

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:native-engine
      - run: npm run check:mac-accessibility
      - run: npm run build:mac
      - run: npm run package:mac
      - run: npm run smoke:mac-package
      - run: npm run smoke:mac-ui
      - uses: actions/upload-artifact@v4
        with:
          name: Codex-Log-Viewer-macOS
          path: |
            dist/macos/Codex-Log-Viewer-*-macOS.zip
            dist/macos/Codex-Log-Viewer-*-macOS.zip.sha256
