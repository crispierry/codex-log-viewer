name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:native-engine
      - run: npm run build:mac
      - run: npm run package:mac
      - run: npm run smoke:mac-package
      - run: npm run smoke:mac-ui
      - uses: actions/upload-artifact@v4
        with:
          name: Codex-Log-Viewer-macOS
          path: |
            dist/macos/Codex-Log-Viewer-*-macOS.zip
            dist/macos/Codex-Log-Viewer-*-macOS.zip.sha256
