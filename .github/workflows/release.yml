name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:all
      - run: npm run package:mac
      - run: npm run smoke:mac-package
      - run: npm run smoke:mac-ui
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/macos/Codex-Log-Viewer-*-macOS.zip \
            dist/macos/Codex-Log-Viewer-*-macOS.zip.sha256 \
            --generate-notes
